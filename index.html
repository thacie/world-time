<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Time</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #f0f1f8;
      color: #1e1e2e;
      display: flex;
      flex-direction: column;
      padding: 24px 30px 16px;
      position: relative;
    }

    /* #5 Mesh gradient background — Apple-style fluid blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 700px; height: 700px;
      background: rgba(99,102,241,0.18);
      top: -250px; left: -150px;
      animation: drift1 38s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 550px; height: 550px;
      background: rgba(236,72,153,0.14);
      bottom: -200px; right: -80px;
      animation: drift2 32s ease-in-out infinite alternate;
    }
    .blob-3 {
      width: 500px; height: 500px;
      background: rgba(34,211,238,0.12);
      top: 30%; left: 55%;
      animation: drift3 42s ease-in-out infinite alternate;
    }
    .blob-4 {
      width: 400px; height: 400px;
      background: rgba(251,191,36,0.1);
      top: 10%; right: 20%;
      animation: drift4 36s ease-in-out infinite alternate;
    }
    .blob-5 {
      width: 350px; height: 350px;
      background: rgba(16,185,129,0.1);
      bottom: 10%; left: 25%;
      animation: drift5 40s ease-in-out infinite alternate;
    }
    @keyframes drift1 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(60px, 40px) scale(1.05); }
      100% { transform: translate(100px, 80px) scale(0.95); }
    }
    @keyframes drift2 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-40px, -50px) scale(1.08); }
      100% { transform: translate(-80px, -100px) scale(0.96); }
    }
    @keyframes drift3 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(0.94); }
      100% { transform: translate(70px, -50px) scale(1.06); }
    }
    @keyframes drift4 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-50px, 60px) scale(1.1); }
    }
    @keyframes drift5 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -70px) scale(0.92); }
    }

    /* Header — clean, no credit */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: #2e2e48;
    }
    h1 span { color: #6366f1; }

    .header-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #999;
      letter-spacing: 0.5px;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .local-time-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.52rem;
      color: #bbb;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* #8 Grid: rounder spacing */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 16px;
      flex: 1;
      min-height: 0;
      position: relative;
      z-index: 1;
    }

    /* #8 Card: 24px radius */
    .card {
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #e2e4ec;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08), 0 0.5px 2px rgba(0,0,0,0.04);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1), box-shadow 0.4s ease;
      cursor: default;
    }

    /* #2 Card hover bottom colored glow */
    .card:hover {
      transform: translateY(-4px) scale(1.012);
    }
    .shanghai:hover   { box-shadow: 0 16px 44px rgba(0,0,0,0.12), 0 6px 20px rgba(239,68,68,0.15); }
    .taipei:hover     { box-shadow: 0 16px 44px rgba(0,0,0,0.12), 0 6px 20px rgba(59,130,246,0.15); }
    .jakarta:hover    { box-shadow: 0 16px 44px rgba(0,0,0,0.12), 0 6px 20px rgba(245,158,11,0.15); }
    .newyork:hover    { box-shadow: 0 16px 44px rgba(0,0,0,0.12), 0 6px 20px rgba(34,197,94,0.15); }
    .losangeles:hover { box-shadow: 0 16px 44px rgba(0,0,0,0.12), 0 6px 20px rgba(249,115,22,0.15); }
    .paris:hover      { box-shadow: 0 16px 44px rgba(0,0,0,0.12), 0 6px 20px rgba(139,92,246,0.15); }
    .london:hover     { box-shadow: 0 16px 44px rgba(0,0,0,0.12), 0 6px 20px rgba(6,182,212,0.15); }
    .sydney:hover     { box-shadow: 0 16px 44px rgba(0,0,0,0.12), 0 6px 20px rgba(16,185,129,0.15); }

    /* Photo background */
    .card-photo {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.6s cubic-bezier(.4,0,.2,1), opacity 1s ease;
      opacity: 0;
    }
    .card.loaded .card-photo { opacity: 1; }
    .card:hover .card-photo { transform: scale(1.05); }

    /* #4 Skeleton loading pulse */
    .card-skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, #e2e4ec 30%, #eef0f6 50%, #e2e4ec 70%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      z-index: 0;
      transition: opacity 0.6s ease;
    }
    .card.loaded .card-skeleton { opacity: 0; pointer-events: none; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Dark gradient overlay */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.0) 25%, rgba(0,0,0,0.0) 40%,
        rgba(0,0,0,0.3) 65%, rgba(0,0,0,0.6) 85%, rgba(0,0,0,0.75) 100%);
      z-index: 1;
      transition: background 0.8s ease;
    }
    .card.is-night .card-overlay {
      background: linear-gradient(180deg,
        rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.1) 25%, rgba(0,0,0,0.15) 40%,
        rgba(0,0,0,0.45) 65%, rgba(0,0,0,0.7) 85%, rgba(0,0,0,0.85) 100%);
    }

    /* Hover city tint */
    .card:hover .card-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.06;
      transition: opacity 0.3s ease;
    }
    .shanghai:hover .card-overlay::after   { background: #ef4444; }
    .taipei:hover .card-overlay::after     { background: #3b82f6; }
    .jakarta:hover .card-overlay::after    { background: #f59e0b; }
    .newyork:hover .card-overlay::after    { background: #22c55e; }
    .losangeles:hover .card-overlay::after { background: #f97316; }
    .paris:hover .card-overlay::after      { background: #8b5cf6; }
    .london:hover .card-overlay::after     { background: #06b6d4; }
    .sydney:hover .card-overlay::after     { background: #10b981; }

    /* Top: city name + landmark */
    .card-header {
      position: relative;
      z-index: 2;
      padding: 18px 20px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .city-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      line-height: 1.2;
    }

    .landmark-label {
      font-size: 0.52rem;
      color: rgba(255,255,255,0.65);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-weight: 600;
      text-shadow: 0 1px 5px rgba(0,0,0,0.5);
      margin-top: 2px;
    }

    /* Bottom: time data */
    .card-content {
      position: relative;
      z-index: 2;
      padding: 0 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .badge {
      font-size: 0.52rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: background 0.5s ease, color 0.5s ease;
    }
    .badge.day   { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #78350f; }
    .badge.night { background: linear-gradient(135deg, #6366f1, #818cf8); color: #e0e7ff; }

    .time-row {
      display: flex;
      align-items: baseline;
      gap: 1px;
    }

    /* #7 Lighter font weight for digits */
    .time-hh, .time-mm {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      font-weight: 400;
      line-height: 1;
      color: #fff;
      min-width: 2ch;
      text-align: center;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .time-sep {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      font-weight: 300;
      line-height: 1;
      color: rgba(255,255,255,0.5);
      animation: breathe 2s ease-in-out infinite;
    }

    .time-ss {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      margin-left: 5px;
      align-self: flex-end;
      padding-bottom: 4px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    /* #1 Digit flip animation */
    .digit-flip {
      animation: digitFlip 0.2s ease-out;
    }
    @keyframes digitFlip {
      0% { opacity: 0.4; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1px;
    }

    .date-display {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .utc-offset {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.54rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.3px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    /* #6 Sun arc indicator */
    .sun-arc {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }
    .sun-arc svg {
      flex-shrink: 0;
    }
    .sun-arc-label {
      font-size: 0.52rem;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      letter-spacing: 0.3px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Left accent bar — vertical */
    .card-accent {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 4px;
      z-index: 3;
      border-radius: 24px 0 0 24px;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }
    .card:hover .card-accent { opacity: 1; }
    .shanghai .card-accent   { background: linear-gradient(180deg, #ef4444, #f97316); }
    .taipei .card-accent     { background: linear-gradient(180deg, #3b82f6, #06b6d4); }
    .jakarta .card-accent    { background: linear-gradient(180deg, #f59e0b, #eab308); }
    .newyork .card-accent    { background: linear-gradient(180deg, #22c55e, #10b981); }
    .losangeles .card-accent { background: linear-gradient(180deg, #f97316, #ec4899); }
    .paris .card-accent      { background: linear-gradient(180deg, #8b5cf6, #a78bfa); }
    .london .card-accent     { background: linear-gradient(180deg, #06b6d4, #22d3ee); }
    .sydney .card-accent     { background: linear-gradient(180deg, #10b981, #34d399); }

    /* #3 Footer */
    footer {
      flex-shrink: 0;
      text-align: center;
      padding-top: 12px;
      position: relative;
      z-index: 1;
    }
    footer::before {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: rgba(0,0,0,0.08);
      margin: 0 auto 8px;
    }
    .footer-credit {
      font-size: 0.52rem;
      color: #bbb;
      letter-spacing: 0.8px;
      font-weight: 400;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, 1fr); }
      body { padding: 14px; overflow-y: auto; height: auto; min-height: 100vh; }
    }
    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- #5 Animated background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>

  <!-- #3 Clean header — no credit -->
  <header>
    <h1>World <span>Time</span></h1>
    <div class="header-time"><span class="local-time-label">local time</span><span id="headerTime"></span></div>
  </header>

  <div class="grid" id="grid"></div>

  <!-- #3 Footer with credit -->
  <footer>
    <div class="footer-credit">provided by Hugo HUANG</div>
  </footer>

  <script>
    const cities = [
      {
        name: 'Shanghai', tz: 'Asia/Shanghai', cls: 'shanghai', landmark: 'The Bund',
        img: 'https://images.unsplash.com/photo-1523281855495-b46cf55b1e7e?w=800&q=80',
        imgNight: 'https://images.unsplash.com/photo-1614221330834-9399e5631af3?w=800&q=80',
        localImg: 'images/shanghai_day.jpg', localImgNight: 'images/shanghai_night.jpg',
        fallback: 'linear-gradient(135deg,#ef4444,#f97316)'
      },
      {
        name: 'Taipei', tz: 'Asia/Taipei', cls: 'taipei', landmark: 'Taipei 101',
        img: 'https://images.unsplash.com/photo-1609147110688-83b5fd1288e8?w=800&q=80',
        imgNight: 'https://images.unsplash.com/photo-1598935898639-81586f7d2129?w=800&q=80',
        localImg: 'images/taipei_day.jpg', localImgNight: 'images/taipei_night.jpg',
        fallback: 'linear-gradient(135deg,#3b82f6,#06b6d4)'
      },
      {
        name: 'Jakarta', tz: 'Asia/Jakarta', cls: 'jakarta', landmark: 'Monas Tower',
        img: 'https://images.unsplash.com/photo-1555605976-8bf855afd253?w=800&q=80',
        imgNight: 'https://images.unsplash.com/photo-1618050032268-6aa510a06191?w=800&q=80',
        localImg: 'images/jakarta_day.jpg', localImgNight: 'images/jakarta_night.jpg',
        fallback: 'linear-gradient(135deg,#f59e0b,#eab308)'
      },
      {
        name: 'New York', tz: 'America/New_York', cls: 'newyork', landmark: 'Manhattan',
        img: 'https://images.unsplash.com/photo-1618861138969-0d7a9d315b1f?w=800&q=80',
        imgNight: 'https://images.unsplash.com/photo-1559075403-a91eebbc7d03?w=800&q=80',
        localImg: 'images/newyork_day.jpg', localImgNight: 'images/newyork_night.jpg',
        fallback: 'linear-gradient(135deg,#22c55e,#10b981)'
      },
      {
        name: 'Los Angeles', tz: 'America/Los_Angeles', cls: 'losangeles', landmark: 'Hollywood Sign',
        img: 'https://images.unsplash.com/photo-1506184106046-1e6e90c0222d?w=800&q=80',
        imgNight: 'https://images.unsplash.com/photo-1611728337177-89dfbbdc7a3a?w=800&q=80',
        localImg: 'images/losangeles_day.jpg', localImgNight: 'images/losangeles_night.jpg',
        fallback: 'linear-gradient(135deg,#f97316,#ec4899)'
      },
      {
        name: 'Paris', tz: 'Europe/Paris', cls: 'paris', landmark: 'Eiffel Tower',
        img: 'https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=800&q=80',
        imgNight: 'https://images.unsplash.com/photo-1565881606991-789a8dff9dbb?w=800&q=80',
        localImg: 'images/paris_day.jpg', localImgNight: 'images/paris_night.jpg',
        fallback: 'linear-gradient(135deg,#8b5cf6,#a78bfa)'
      },
      {
        name: 'London', tz: 'Europe/London', cls: 'london', landmark: 'Big Ben',
        img: 'https://images.unsplash.com/photo-1500380804539-4e1e8c1e7118?w=800&q=80',
        imgNight: 'https://images.unsplash.com/photo-1519773483179-fa089c182a4a?w=800&q=80',
        localImg: 'images/london_day.jpg', localImgNight: 'images/london_night.jpg',
        fallback: 'linear-gradient(135deg,#06b6d4,#22d3ee)'
      },
      {
        name: 'Sydney', tz: 'Australia/Sydney', cls: 'sydney', landmark: 'Opera House',
        img: 'https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?w=800&q=80',
        imgNight: 'https://images.unsplash.com/photo-1527251672045-a80241b3f574?w=800&q=80',
        localImg: 'images/sydney_day.jpg', localImgNight: 'images/sydney_night.jpg',
        fallback: 'linear-gradient(135deg,#10b981,#34d399)'
      },
    ];

    function pad(n) { return String(n).padStart(2, '0'); }

    function safeFormat(date, opts) {
      return pad(parseInt(new Intl.DateTimeFormat('en-GB', opts).format(date)));
    }

    function formatOffset(offsetMin) {
      const sign = offsetMin >= 0 ? '+' : '-';
      const abs  = Math.abs(offsetMin);
      const h = Math.floor(abs / 60);
      const m = abs % 60;
      return `UTC${sign}${pad(h)}:${pad(m)}`;
    }

    // #6 Sun arc: compute SVG based on hour + minute
    function sunArcSvg(hour, minute, isDay) {
      const w = 56, h = 22;
      const cx = w / 2, cy = h - 2, r = 16;
      // Arc from left (6am) to right (6pm)
      const arcPath = `M${cx - r},${cy} A${r},${r} 0 0,1 ${cx + r},${cy}`;

      if (isDay) {
        // Day: golden sun on arc
        const totalMin = hour * 60 + minute;
        const progress = Math.max(0, Math.min(1, (totalMin - 360) / 720));
        const angle = Math.PI * (1 - progress);
        const sunX = cx + r * Math.cos(angle);
        const sunY = cy - r * Math.sin(angle);
        return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
          <path d="${arcPath}" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="${cx - r}" y1="${cy}" x2="${cx + r}" y2="${cy}" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" stroke-dasharray="2,2"/>
          <circle cx="${sunX.toFixed(1)}" cy="${sunY.toFixed(1)}" r="7" fill="#fbbf24" opacity="0.12"/>
          <circle cx="${sunX.toFixed(1)}" cy="${sunY.toFixed(1)}" r="3.5" fill="#fbbf24"/>
        </svg>`;
      } else {
        // Night: crescent moon + stars, below-horizon moon position
        const totalMin = hour * 60 + minute;
        // Moon travels an inverted arc at night (6pm=left, 12am=top, 6am=right)
        let nightProgress;
        if (hour >= 18) {
          nightProgress = (totalMin - 1080) / 720; // 6pm to 6am
        } else {
          nightProgress = (totalMin + 360) / 720; // midnight to 6am
        }
        nightProgress = Math.max(0, Math.min(1, nightProgress));
        const moonAngle = Math.PI * (1 - nightProgress);
        const moonX = cx + r * Math.cos(moonAngle);
        const moonY = cy - r * Math.sin(moonAngle);
        // Crescent moon: main circle + cutout circle
        const cutX = moonX + 1.8;
        const cutY = moonY - 1.2;
        return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
          <path d="${arcPath}" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="${cx - r}" y1="${cy}" x2="${cx + r}" y2="${cy}" stroke="rgba(255,255,255,0.12)" stroke-width="0.5" stroke-dasharray="2,2"/>
          <circle cx="${moonX.toFixed(1)}" cy="${moonY.toFixed(1)}" r="6" fill="#c7d2fe" opacity="0.1"/>
          <circle cx="${moonX.toFixed(1)}" cy="${moonY.toFixed(1)}" r="3.5" fill="#c7d2fe"/>
          <circle cx="${cutX.toFixed(1)}" cy="${cutY.toFixed(1)}" r="3" fill="#1a1a2e" opacity="0.85"/>
          <circle cx="${cx - r + 3}" cy="${cy - 4}" r="0.8" fill="rgba(255,255,255,0.5)"/>
          <circle cx="${cx + r - 5}" cy="${cy - 8}" r="0.6" fill="rgba(255,255,255,0.4)"/>
          <circle cx="${cx + 2}" cy="${cy - 14}" r="0.7" fill="rgba(255,255,255,0.45)"/>
        </svg>`;
      }
    }

    function updateHeaderTime() {
      const now = new Date();
      const fmt = new Intl.DateTimeFormat('en-GB', {
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
      });
      document.getElementById('headerTime').textContent = fmt.format(now);
    }

    // Preload images
    const imgLoaded = {};
    cities.forEach(city => {
      const dayImg = new Image();
      dayImg.onload  = () => { imgLoaded[city.cls + '-day'] = true; markLoaded(city.cls); };
      dayImg.onerror = () => { imgLoaded[city.cls + '-day'] = false; markLoaded(city.cls); };
      dayImg.src = city.img;

      const nightImg = new Image();
      nightImg.onload  = () => { imgLoaded[city.cls + '-night'] = true; markLoaded(city.cls); };
      nightImg.onerror = () => { imgLoaded[city.cls + '-night'] = false; markLoaded(city.cls); };
      nightImg.src = city.imgNight;
    });

    cities.forEach(city => {
      new Image().src = city.localImg;
      new Image().src = city.localImgNight;
    });

    // #4 Mark card as loaded when image is ready
    function markLoaded(cls) {
      const el = document.querySelector('.card.' + cls);
      if (el && !el.classList.contains('loaded')) {
        el.classList.add('loaded');
      }
    }

    // Also mark loaded after local fallback timeout
    setTimeout(() => {
      document.querySelectorAll('.card').forEach(c => c.classList.add('loaded'));
    }, 2000);

    function renderCards() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      updateHeaderTime();

      const now = new Date();
      const utcStr = now.toLocaleString('en-US', { timeZone: 'UTC' });
      const localOffset = -now.getTimezoneOffset();

      cities.forEach((city, idx) => {
        const hh = safeFormat(now, { hour: '2-digit', hour12: false, timeZone: city.tz });
        const mm = safeFormat(now, { minute: '2-digit', timeZone: city.tz });
        const ss = safeFormat(now, { second: '2-digit', timeZone: city.tz });

        const dateFmt = new Intl.DateTimeFormat('en-US', {
          weekday: 'short', month: 'short', day: 'numeric', timeZone: city.tz
        });

        const hour = parseInt(hh);
        const isDay = hour >= 6 && hour < 18;

        const localStr = now.toLocaleString('en-US', { timeZone: city.tz });
        const diffMs = new Date(localStr) - new Date(utcStr);
        const offsetMin = Math.round(diffMs / 60000);

        const cdnLoaded = imgLoaded[city.cls + (isDay ? '-day' : '-night')];
        const cdnUrl = isDay ? city.img : city.imgNight;
        const localUrl = isDay ? city.localImg : city.localImgNight;
        const bgImage = cdnLoaded !== false ? cdnUrl : localUrl;
        const bgStyle = `background:${city.fallback};background-image:url('${bgImage}');background-size:cover;background-position:center;`;

        const card = document.createElement('div');
        card.className = `card ${city.cls}${isDay ? '' : ' is-night'}`;
        card.dataset.idx = idx;
        card.dataset.lastHour = hour;
        card.dataset.lastHh = hh;
        card.dataset.lastMm = mm;
        card.dataset.lastSs = ss;

        const arcHtml = sunArcSvg(hour, parseInt(mm), isDay);

        card.innerHTML = `
          <div class="card-skeleton"></div>
          <div class="card-photo" style="${bgStyle}"></div>
          <div class="card-overlay"></div>
          <div class="card-accent"></div>
          <div class="card-header">
            <div>
              <div class="city-name">${city.name}</div>
              <div class="landmark-label">${city.landmark}</div>
            </div>
            <div class="badge ${isDay ? 'day' : 'night'}">${isDay ? '☀ Day' : '☾ Night'}</div>
          </div>
          <div class="card-content">
            <div class="time-row">
              <span class="time-hh">${hh}</span>
              <span class="time-sep">:</span>
              <span class="time-mm">${mm}</span>
              <span class="time-ss">${ss}</span>
            </div>
            <div class="sun-arc">${arcHtml}<span class="sun-arc-label">${formatOffset(offsetMin)}</span></div>
            <div class="card-bottom">
              <span class="date-display">${dateFmt.format(now)}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);

        // Mark loaded if image already cached
        if (imgLoaded[city.cls + (isDay ? '-day' : '-night')] !== undefined) {
          card.classList.add('loaded');
        }
      });
    }

    // #1 Flip animation helper
    function flipIfChanged(el, newVal, dataKey, card) {
      if (card.dataset[dataKey] !== newVal) {
        card.dataset[dataKey] = newVal;
        el.textContent = newVal;
        el.classList.remove('digit-flip');
        void el.offsetWidth; // trigger reflow
        el.classList.add('digit-flip');
      }
    }

    function updateTimes() {
      updateHeaderTime();
      const now = new Date();
      const utcStr = now.toLocaleString('en-US', { timeZone: 'UTC' });
      const localOffset = -now.getTimezoneOffset();
      const cards = document.querySelectorAll('.card');

      cards.forEach(card => {
        const idx = parseInt(card.dataset.idx);
        const city = cities[idx];

        const hh = safeFormat(now, { hour: '2-digit', hour12: false, timeZone: city.tz });
        const mm = safeFormat(now, { minute: '2-digit', timeZone: city.tz });
        const ss = safeFormat(now, { second: '2-digit', timeZone: city.tz });

        // #1 Flip animation on digit change
        flipIfChanged(card.querySelector('.time-hh'), hh, 'lastHh', card);
        flipIfChanged(card.querySelector('.time-mm'), mm, 'lastMm', card);
        flipIfChanged(card.querySelector('.time-ss'), ss, 'lastSs', card);

        const hour = parseInt(hh);
        const lastHour = parseInt(card.dataset.lastHour);
        if (hour !== lastHour) {
          card.dataset.lastHour = hour;
          const isDay = hour >= 6 && hour < 18;

          card.classList.toggle('is-night', !isDay);

          const badge = card.querySelector('.badge');
          badge.className = `badge ${isDay ? 'day' : 'night'}`;
          badge.textContent = isDay ? '☀ Day' : '☾ Night';

          const cdnLoaded = imgLoaded[city.cls + (isDay ? '-day' : '-night')];
          const cdnUrl = isDay ? city.img : city.imgNight;
          const localUrl = isDay ? city.localImg : city.localImgNight;
          const bgImage = cdnLoaded !== false ? cdnUrl : localUrl;
          const photo = card.querySelector('.card-photo');
          photo.style.background = city.fallback;
          photo.style.backgroundImage = `url('${bgImage}')`;
          photo.style.backgroundSize = 'cover';
          photo.style.backgroundPosition = 'center';

          const dateFmt = new Intl.DateTimeFormat('en-US', {
            weekday: 'short', month: 'short', day: 'numeric', timeZone: city.tz
          });
          const localStr = now.toLocaleString('en-US', { timeZone: city.tz });
          const diffMs = new Date(localStr) - new Date(utcStr);
          const offsetMin = Math.round(diffMs / 60000);
          card.querySelector('.date-display').textContent = dateFmt.format(now);

          // #6 Update sun arc
          const arcContainer = card.querySelector('.sun-arc');
          arcContainer.innerHTML = sunArcSvg(hour, parseInt(mm), isDay) + `<span class="sun-arc-label">${formatOffset(offsetMin)}</span>`;
        }
      });
    }

    renderCards();
    setInterval(updateTimes, 1000);
  </script>
</body>
</html>
